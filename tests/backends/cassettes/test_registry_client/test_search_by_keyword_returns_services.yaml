- request:
    body: REQUEST=doQuery&LANG=ADQL&MAXREC=5&QUERY=SELECT%0Aivoid%2C+res_type%2C+short_name%2C+res_title%2C+content_level%2C+res_description%2C+reference_url%2C+creator_seq%2C+created%2C+updated%2C+rights%2C+content_type%2C+source_format%2C+source_value%2C+region_of_regard%2C+waveband%2C+%0A++ivo_string_agg%28COALESCE%28access_url%2C+%27%27%29%2C+%27%3A%3A%3Apy+VO+sep%3A%3A%3A%27%29+AS+access_urls%2C+%0A++ivo_string_agg%28COALESCE%28standard_id%2C+%27%27%29%2C+%27%3A%3A%3Apy+VO+sep%3A%3A%3A%27%29+AS+standard_ids%2C+%0A++ivo_string_agg%28COALESCE%28intf_type%2C+%27%27%29%2C+%27%3A%3A%3Apy+VO+sep%3A%3A%3A%27%29+AS+intf_types%2C+%0A++ivo_string_agg%28COALESCE%28intf_role%2C+%27%27%29%2C+%27%3A%3A%3Apy+VO+sep%3A%3A%3A%27%29+AS+intf_roles%2C+%0A++ivo_string_agg%28COALESCE%28cap_description%2C+%27%27%29%2C+%27%3A%3A%3Apy+VO+sep%3A%3A%3A%27%29+AS+cap_descriptions%0AFROM%0Arr.resource%0ANATURAL+LEFT+OUTER+JOIN+rr.capability%0ANATURAL+LEFT+OUTER+JOIN+rr.interface%0AWHERE%0A%28ivoid+IN+%28SELECT+DISTINCT+ivoid+FROM+rr.resource+WHERE+1%3Divo_hasword%28res_description%2C+%27smash%27%29+UNION+ALL+SELECT+DISTINCT+ivoid+FROM+rr.resource+WHERE+1%3Divo_hasword%28res_title%2C+%27smash%27%29+UNION+ALL+SELECT+DISTINCT+ivoid+FROM+rr.res_subject+WHERE+rr.res_subject.res_subject+ILIKE+%27%25smash%25%27%29%29%0AGROUP+BY%0Aivoid%2C+res_type%2C+short_name%2C+res_title%2C+content_level%2C+res_description%2C+reference_url%2C+creator_seq%2C+created%2C+updated%2C+rights%2C+content_type%2C+source_format%2C+source_value%2C+region_of_regard%2C+waveband
    headers:
      Accept:
      - '*/*'
      Accept-Encoding:
      - gzip, deflate
      Connection:
      - keep-alive
      Content-Length:
      - '1535'
      Content-Type:
      - application/x-www-form-urlencoded
      User-Agent:
      - pyVO/1.8.1 Python/3.12.12 (Darwin)
    method: POST
    uri: http://reg.g-vo.org/tap/sync
