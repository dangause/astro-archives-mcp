    body:
      string: "<?xml version='1.0' encoding='utf-8'?>\n<VOTABLE version=\"1.5\" xmlns=\"http://www.ivoa.net/xml/VOTable/v1.3\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://www.ivoa.net/xml/VOTable/v1.3
        http://vo.ari.uni-heidelberg.de/docs/schemata/VOTable.xsd\"><RESOURCE type=\"results\"><INFO
        name=\"sql_query\" value=\"SELECT ivoid, res_type, short_name, res_title,
        content_level, res_description, reference_url, creator_seq, created, updated,
        rights, content_type, source_format, source_value, region_of_regard, waveband,
        string_agg(COALESCE ( access_url , '' ), ':::py VO sep:::') AS access_urls,
        string_agg(COALESCE ( standard_id , '' ), ':::py VO sep:::') AS standard_ids,
        string_agg(COALESCE ( intf_type , '' ), ':::py VO sep:::') AS intf_types,
        string_agg(COALESCE ( intf_role , '' ), ':::py VO sep:::') AS intf_roles,
        string_agg(COALESCE ( cap_description , '' ), ':::py VO sep:::') AS cap_descriptions
        FROM rr.resource NATURAL LEFT OUTER JOIN rr.capability  NATURAL LEFT OUTER
        JOIN rr.interface  WHERE ( ivoid IN ( SELECT DISTINCT ivoid FROM rr.resource
        WHERE (to_tsvector('english', res_description) @@ plainto_tsquery('english',
        'smash')) UNION ALL SELECT DISTINCT ivoid FROM rr.resource WHERE (to_tsvector('english',
        res_title) @@ plainto_tsquery('english', 'smash')) UNION ALL SELECT DISTINCT
        ivoid FROM rr.res_subject WHERE rr.res_subject.res_subject ILIKE '%%smash%%'
        ) ) GROUP BY ivoid , res_type , short_name , res_title , content_level , res_description
        , reference_url , creator_seq , created , updated , rights , content_type
        , source_format , source_value , region_of_regard , waveband LIMIT 5\">ADQL
        query translated to local SQL (for debugging)</INFO><INFO name=\"query\" value=\"SELECT\nivoid,
        res_type, short_name, res_title, content_level, res_description, reference_url,
        creator_seq, created, updated, rights, content_type, source_format, source_value,
        region_of_regard, waveband, \n  ivo_string_agg(COALESCE(access_url, ''), ':::py
        VO sep:::') AS access_urls, \n  ivo_string_agg(COALESCE(standard_id, ''),
        ':::py VO sep:::') AS standard_ids, \n  ivo_string_agg(COALESCE(intf_type,
        ''), ':::py VO sep:::') AS intf_types, \n  ivo_string_agg(COALESCE(intf_role,
        ''), ':::py VO sep:::') AS intf_roles, \n  ivo_string_agg(COALESCE(cap_description,
        ''), ':::py VO sep:::') AS cap_descriptions\nFROM\nrr.resource\nNATURAL LEFT
        OUTER JOIN rr.capability\nNATURAL LEFT OUTER JOIN rr.interface\nWHERE\n(ivoid
        IN (SELECT DISTINCT ivoid FROM rr.resource WHERE 1=ivo_hasword(res_description,
        'smash') UNION ALL SELECT DISTINCT ivoid FROM rr.resource WHERE 1=ivo_hasword(res_title,
        'smash') UNION ALL SELECT DISTINCT ivoid FROM rr.res_subject WHERE rr.res_subject.res_subject
        ILIKE '%smash%'))\nGROUP BY\nivoid, res_type, short_name, res_title, content_level,
        res_description, reference_url, creator_seq, created, updated, rights, content_type,
        source_format, source_value, region_of_regard, waveband\">Original ADQL query</INFO><INFO
        name=\"QUERY_STATUS\" value=\"OK\">Query successful</INFO><INFO name=\"server_software\"
        value=\"DaCHS/2.12.2 twistedWeb/22.4.0\">Software that produced this VOTable</INFO><INFO
