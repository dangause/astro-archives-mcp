        value=\"GAVO Data Centre\">Name of a person or entity that produced a contributing
        resource</INFO><TABLE name=\"resource_capability_interface\"><GROUP ID=\"ndtoggntmuha\"
        name=\"note-cl\"><DESCRIPTION>\nThe terms are taken from the vocabulary\nhttp://ivoa.net/rdf/voresource/content_level.</DESCRIPTION><FIELDref
        ref=\"content_level\"/></GROUP><GROUP ID=\"ndtoggntmbea\" name=\"note-ct\"><DESCRIPTION>\nThe
        terms are taken from the vocabulary\nhttp://ivoa.net/rdf/voresource/content_type.</DESCRIPTION><FIELDref
        ref=\"content_type\"/></GROUP><GROUP ID=\"ndtoggntmasa\" name=\"note-w\"><DESCRIPTION>\nThe
        allowed values for waveband include:\nRadio, Millimeter, Infrared, Optical,
        UV, EUV, X-ray, Gamma-ray.</DESCRIPTION><FIELDref ref=\"waveband\"/></GROUP><FIELD
        ID=\"ivoid\" arraysize=\"*\" datatype=\"char\" name=\"ivoid\" utype=\"xpath:identifier\"><DESCRIPTION>Unambiguous
        reference to the resource conforming to the IVOA standard for identifiers.</DESCRIPTION></FIELD><FIELD
        ID=\"res_type\" arraysize=\"*\" datatype=\"char\" name=\"res_type\" utype=\"xpath:@xsi:type\"><DESCRIPTION>Resource
        type (something like vg:authority, vs:catalogservice, etc).</DESCRIPTION></FIELD><FIELD
        ID=\"short_name\" arraysize=\"*\" datatype=\"char\" name=\"short_name\" utype=\"xpath:shortName\"><DESCRIPTION>A
        short name or abbreviation given to something, for presentation in space-constrained
        fields (up to 16 characters).</DESCRIPTION></FIELD><FIELD ID=\"res_title\"
        arraysize=\"*\" datatype=\"unicodeChar\" name=\"res_title\" utype=\"xpath:title\"><DESCRIPTION>The
        full name given to the resource.</DESCRIPTION></FIELD><FIELD ID=\"content_level\"
        arraysize=\"*\" datatype=\"char\" name=\"content_level\" utype=\"xpath:content/contentLevel\"><DESCRIPTION>A
        hash-separated list of content levels specifying the intended audience.</DESCRIPTION></FIELD><FIELD
        ID=\"res_description\" arraysize=\"*\" datatype=\"unicodeChar\" name=\"res_description\"
        utype=\"xpath:content/description\"><DESCRIPTION>An account of the nature
        of the resource.</DESCRIPTION></FIELD><FIELD ID=\"reference_url\" arraysize=\"*\"
        datatype=\"char\" name=\"reference_url\" utype=\"xpath:content/referenceURL\"><DESCRIPTION>URL
        pointing to a human-readable document describing this resource.</DESCRIPTION></FIELD><FIELD
        ID=\"creator_seq\" arraysize=\"*\" datatype=\"unicodeChar\" name=\"creator_seq\"
        utype=\"xpath:curation/creator/name\"><DESCRIPTION>The creator(s) of the resource
        in the order given by the resource record author, separated by semicolons.</DESCRIPTION></FIELD><FIELD
        ID=\"created\" arraysize=\"*\" datatype=\"char\" name=\"created\" utype=\"xpath:@created\"
        xtype=\"timestamp\"><DESCRIPTION>The UTC date and time this resource metadata
        description was created.</DESCRIPTION><VALUES null=\"\"></VALUES></FIELD><FIELD
        ID=\"updated\" arraysize=\"*\" datatype=\"char\" name=\"updated\" utype=\"xpath:@updated\"
        xtype=\"timestamp\"><DESCRIPTION>The UTC date this resource metadata description
        was last updated.</DESCRIPTION><VALUES null=\"\"></VALUES></FIELD><FIELD ID=\"rights\"
        arraysize=\"*\" datatype=\"char\" name=\"rights\" utype=\"xpath:/rights\"><DESCRIPTION>A
        statement of usage conditions (license, attribution, embargo, etc).</DESCRIPTION></FIELD><FIELD
        ID=\"content_type\" arraysize=\"*\" datatype=\"char\" name=\"content_type\"
        utype=\"xpath:content/type\"><DESCRIPTION>A hash-separated list of natures
        or genres of the content of the resource.</DESCRIPTION></FIELD><FIELD ID=\"source_format\"
        arraysize=\"*\" datatype=\"char\" name=\"source_format\" utype=\"xpath:content/source/@format\"><DESCRIPTION>The
        format of source_value. This, in particular, can be ``bibcode''.</DESCRIPTION></FIELD><FIELD
        ID=\"source_value\" arraysize=\"*\" datatype=\"unicodeChar\" name=\"source_value\"
        utype=\"xpath:content/source\"><DESCRIPTION>A bibliographic reference from
        which the present resource is derived or extracted.</DESCRIPTION></FIELD><FIELD
        ID=\"region_of_regard\" datatype=\"float\" name=\"region_of_regard\" unit=\"deg\"
        utype=\"xpath:coverage/regionOfRegard\"><DESCRIPTION>A single numeric value
        representing the angle, given in decimal degrees, by which a positional query
        against this resource should be ``blurred'' in order to get an appropriate
        match.</DESCRIPTION></FIELD><FIELD ID=\"waveband\" arraysize=\"*\" datatype=\"char\"
        name=\"waveband\" utype=\"xpath:coverage/waveband\"><DESCRIPTION>A hash-separated
        list of regions of the electro-magnetic spectrum that the resource's spectral
        coverage overlaps with.</DESCRIPTION></FIELD><FIELD ID=\"access_urls\" arraysize=\"*\"
        datatype=\"char\" name=\"access_urls\"/><FIELD ID=\"standard_ids\" arraysize=\"*\"
        datatype=\"char\" name=\"standard_ids\"/><FIELD ID=\"intf_types\" arraysize=\"*\"
