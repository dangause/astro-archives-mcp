      string: "<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?><ns2:tableset
        xmlns:ns2=\"http://www.ivoa.net/xml/VOSITables/v1.0\"><schema><name>asm</name><description>The
        Astronomical Site Monitor (asm) schema contains the measurements of environmental
        conditions at the three sites La Silla, Paranal, and Chajnantor.</description><table
        type=\"view\"><name>asm.ambient_lasilla</name><description>Table containing
        historical La Silla ambient data measured by the old DIMM2 seeing monitor
        (1994-2023) and those measured by the Ring-Image Next Generation Scintillation
        Sensor (RINGSS) since 02 May 2025. Time coverage: January 1994 onwards. More
        info at: https://archive.eso.org/wdb/help/eso/ambient_lasilla.html#ambient</description><column><name>airmass</name><description>Airmass:
        Airmass at which the ASM-DIMM telescope measures the site seeing.</description><ucd>obs.airMass</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType><flag>principal</flag></column><column><name>dec</name><description>Target
        declination FK5 J2000: The declination of the observed star at which the ASM-DIMM
        telescope measures the site seeing [deg].</description><unit>deg</unit><ucd>pos.eq.dec</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">double</dataType><flag>principal</flag></column><column><name>fwhm</name><description>DIMM-Seeing:
        Observatory site seeing as measured by the ASM-DIMM telescope, Full Width
        Half Maximum at 500nm [arcsec]</description><unit>arcsec</unit><ucd>instr.obsty.seeing;meta.main</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType><flag>principal</flag></column><column><name>integration</name><description>Timebin
        [s] used for measurement of ambient data sample.</description><unit>s</unit><ucd>time.interval</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">short</dataType><flag>principal</flag></column><column><name>midpoint_date</name><description>Midpoint
        (time) of the measurement.</description><ucd>time</ucd><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\"
        arraysize=\"*\" extendedType=\"timestamp\">char</dataType><flag>principal</flag></column><column><name>ra</name><description>Target
        right ascension FK5 J2000: The right ascension of the target star at which
        the ASM-DIMM telescope measures the site seeing [deg]</description><unit>deg</unit><ucd>pos.eq.ra</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">double</dataType><flag>principal</flag></column><column><name>start_date</name><description>Start
        time of the measurement.</description><ucd>time.start</ucd><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\"
        arraysize=\"*\" extendedType=\"timestamp\">char</dataType><flag>principal</flag></column></table><table
        type=\"view\"><name>asm.dimm_paranal</name><description>Table containing the
        ambient measurements of the Differential Image Motion Monitor (DIMM) channel
        of the MASS-DIMM instrument. DIMM operates in an extended range of atmospheric
        conditions which overlap science operation. It provides, along with other
        measurements, the Paranal reference seeing. Time coverage: 2016-APR-04 12:00:00
        UTC onwards. More info at: http://archive.eso.org/wdb/help/eso/ambient_paranal.html#dimm_2016</description><column><name>\"interval\"</name><description>Timebin
        [s] used for measurement of ambient data sample.</description><unit>s</unit><ucd>time.interval</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">short</dataType></column><column><name>airmass</name><description>Airmass:
        Airmass at which the ASM-DIMM telescope measures the site seeing. (eng. param.)</description><ucd>obs.airMass</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType><flag>principal</flag></column><column><name>alt</name><description>Telescope
        pointing: Telescope elevation [deg]. (setup param.)</description><unit>deg</unit><ucd>pos.az.alt</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType><flag>principal</flag></column><column><name>az</name><description>Telescope
        pointing: Telescope azimuth [deg]. (setup param.)</description><unit>deg</unit><ucd>pos.az.azi</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType><flag>principal</flag></column><column><name>dec</name><description>Target
        declination FK5 J2000: The declination of the observed star at which the ASM-DIMM
        telescope measures the site seeing [deg]. (setup param.)</description><unit>deg</unit><ucd>pos.eq.dec</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">double</dataType><flag>principal</flag></column><column><name>frames</name><description>Number
        of frames: Total number of processed frames. (eng. param.)</description><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">int</dataType></column><column><name>fwhm</name><description>DIMM-Seeing:
        The total seeing calculated with DIMM telescope. The value is calculated using
        the following formula: FWHM = 2E(+7) C.n2**(0.6) [arcsec] (sci. param.)</description><unit>arcsec</unit><ucd>instr.obsty.seeing;meta.main</ucd><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType><flag>principal</flag></column><column><name>lcoefrel</name><description>Longitudinal
        Correlation: Average of the longitudinal  basetime correlation coefficient.
        (eng. param.)</description><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>lflux</name><description>Left
        Mean Flux: Mean total flux in the left image [ADU]. (eng. param.)</description><unit>adu</unit><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">int</dataType></column><column><name>lfluxerr</name><description>Left
        Mean Flux RMS: Relative RMS error of total flux in the left image. (eng. param.)</description><dataType
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\"
        xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>lhvar</name><description>Longitudinal
        Variance: Average of the longitudinal motion basetime variance [pixel**2].
        (eng. param.)</description><unit>pixel**2</unit><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>lhvarerr</name><description>Longitudinal
        Variance RMS: RMS of the longitudinal motion basetime variance [pixel]. (eng.
