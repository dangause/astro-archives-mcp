        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>llvar</name><description>Longitudinal
        Variance Average: Low frequency longitudinal motion variance [pixel**2]. (eng.
        param.)</description><unit>pixel**2</unit><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>lsci</name><description>Left
        Scintillation Index: Mean scintillation index in the DIMM aperture for the
        left image. (eng. param.)</description><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>lsep</name><description>Longitudinal
        Separation: Mean longitudinal separation of right and left images [pixel].
        (eng. param.)</description><unit>pixel</unit><dataType xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xmlns:ns4=\"http://www.ivoa.net/xml/VODataService/v1.1\" xsi:type=\"ns4:VOTableType\">float</dataType></column><column><name>lstrh</name><description>Left
        Strehl Number: Strehl number corrected for seeing for the left image. (eng.
